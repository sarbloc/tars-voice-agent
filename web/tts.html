<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <title>TARS · TTS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #09090b;
            --surface: #131316;
            --border: #1e1e23;
            --text-primary: #e4e4e7;
            --text-secondary: #71717a;
            --text-dim: #3f3f46;
            --amber: #d4a043;
            --amber-dim: #d4a04320;
            --red: #ef4444;
        }

        html, body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Geist Mono', monospace;
            -webkit-font-smoothing: antialiased;
        }
        body {
            min-height: 100vh;
            min-height: 100dvh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px;
            pointer-events: none;
            z-index: 100;
        }

        .wrap {
            max-width: 720px;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0 auto;
            padding: calc(24px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .clear-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 5px 9px;
            cursor: pointer;
            transition: color .15s, border-color .15s;
        }
        .clear-btn:hover:not(:disabled) { color: var(--amber); border-color: var(--amber-dim); opacity: 1; }
        .clear-btn:disabled { opacity: .35; cursor: not-allowed; }

        header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        header h1 {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--amber);
        }

        header a {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: color .15s, border-color .15s;
        }
        header a:hover { color: var(--amber); border-color: var(--amber-dim); }

        label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            flex: 1;
            min-height: 280px;
            resize: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 16px;
            line-height: 1.6;
            padding: 14px 16px;
            outline: none;
            transition: border-color .15s;
        }
        textarea:focus { border-color: var(--amber-dim); }

        .mode-switch {
            display: flex;
            gap: 6px;
            margin-top: 14px;
            flex-shrink: 0;
        }
        .mode-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 7px 14px;
            cursor: pointer;
            transition: color .15s, border-color .15s, background .15s;
        }
        .mode-btn.active {
            color: var(--amber);
            border-color: var(--amber-dim);
            background: var(--amber-dim);
        }

        .hidden { display: none !important; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .voice-row { display: flex; flex-direction: column; }
        .select-row { display: flex; gap: 6px; align-items: stretch; }

        .weight-wrap {
            display: flex;
            flex-direction: column;
            min-width: 180px;
            flex: 1 1 200px;
        }
        .weight-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 34px;
            background: transparent;
            accent-color: var(--amber);
            cursor: pointer;
            margin: 0;
            padding: 0;
        }
        .weight-slider::-webkit-slider-runnable-track {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }
        .weight-slider::-moz-range-track {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }
        .weight-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--amber);
            margin-top: -6px;
            cursor: pointer;
        }
        .weight-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border: none;
            border-radius: 50%;
            background: var(--amber);
            cursor: pointer;
        }
        .weight-label {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 2px;
            text-align: center;
        }

        .secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .secondary:hover:not(:disabled) {
            color: var(--amber);
            border-color: var(--amber-dim);
            opacity: 1;
        }

        .icon-btn {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 16px;
            line-height: 1;
            padding: 0 12px;
            cursor: pointer;
            transition: color .15s, border-color .15s;
        }
        .icon-btn:hover { color: var(--red); border-color: var(--red); }
        .icon-btn.armed { color: var(--red); border-color: var(--red); font-size: 10px; letter-spacing: 0.1em; padding: 0 10px; text-transform: uppercase; }

        .save-form {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            align-items: stretch;
            flex-shrink: 0;
        }
        .save-form input[type="text"] {
            flex: 1;
            min-width: 0;
        }

        select, input[type="text"] {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 16px;
            padding: 10px 12px;
            outline: none;
        }
        input[type="text"] { min-width: 160px; }

        button {
            background: var(--amber);
            color: #09090b;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 11px 20px;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
        }
        button:hover:not(:disabled) { opacity: .9; }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { opacity: .4; cursor: not-allowed; }

        .status {
            margin-top: 20px;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-secondary);
            min-height: 14px;
        }
        .status.error { color: var(--red); }

        .result {
            margin-top: 24px;
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: none;
        }
        .result.visible { display: block; }

        audio {
            width: 100%;
            margin-bottom: 14px;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .meta a {
            color: var(--amber);
            text-decoration: none;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .meta a:hover { text-decoration: underline; }

        .char-count {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 6px;
            text-align: right;
            letter-spacing: 0.08em;
            flex-shrink: 0;
        }

        .status {
            flex-shrink: 0;
        }
        .result { flex-shrink: 0; }

        @media (max-width: 520px) {
            header { margin-bottom: 14px; padding-bottom: 10px; }
            header h1 { font-size: 15px; }
            .controls { gap: 8px; }
            .controls button { padding: 11px 16px; }
            select, input[type="text"] { padding: 9px 10px; }
            input[type="text"] { min-width: 140px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>TARS · TTS Studio</h1>
            <a href="/">← Live</a>
        </header>

        <div class="editor">
            <div class="label-row">
                <label for="text" style="margin-bottom:0">Text</label>
                <button type="button" id="clear" class="clear-btn" disabled>Clear</button>
            </div>
            <textarea id="text" placeholder="Paste or type the text to synthesize. Punctuation drives pacing — use it generously."></textarea>
            <div class="char-count"><span id="count">0</span> chars</div>
        </div>

        <div class="mode-switch">
            <button type="button" class="mode-btn active" data-mode="single">Single</button>
            <button type="button" class="mode-btn" data-mode="blend">Blend</button>
        </div>

        <div class="controls">
            <div class="voice-row single-only">
                <label for="voice" style="margin-bottom:4px">Voice</label>
                <div class="select-row">
                    <select id="voice"><option value="">loading…</option></select>
                    <button type="button" id="delete-blend" class="icon-btn hidden" title="Delete saved blend">×</button>
                </div>
            </div>

            <div class="voice-row blend-only hidden">
                <label for="voiceA" style="margin-bottom:4px">Voice A</label>
                <select id="voiceA"><option value="">loading…</option></select>
            </div>
            <div class="voice-row blend-only hidden">
                <label for="voiceB" style="margin-bottom:4px">Voice B</label>
                <select id="voiceB"><option value="">loading…</option></select>
            </div>
            <div class="weight-wrap blend-only hidden">
                <label for="weight" style="margin-bottom:4px">Blend</label>
                <input type="range" id="weight" class="weight-slider" min="1" max="99" step="1" value="50">
                <span class="weight-label" id="weight-label">50% A · 50% B</span>
            </div>

            <div class="voice-row">
                <label for="format" style="margin-bottom:4px">Format</label>
                <select id="format">
                    <option value="wav">WAV</option>
                    <option value="mp3">MP3</option>
                    <option value="flac">FLAC</option>
                    <option value="opus">Opus</option>
                </select>
            </div>
            <div style="flex:1"></div>
            <button type="button" id="save-blend" class="secondary blend-only hidden">Save blend</button>
            <button type="button" id="go">Generate</button>
        </div>

        <div class="save-form hidden" id="save-form">
            <input type="text" id="save-name" placeholder="blend name (letters, digits, _)" maxlength="40" autocomplete="off" spellcheck="false">
            <button type="button" id="save-confirm" class="secondary">Save</button>
            <button type="button" id="save-cancel" class="icon-btn" title="Cancel">×</button>
        </div>

        <div class="status" id="status"></div>

        <div class="result" id="result">
            <audio id="player" controls></audio>
            <div class="meta">
                <span id="info"></span>
                <a id="download" download>Download</a>
            </div>
        </div>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);
        const text = $("text"), voice = $("voice"), fmt = $("format");
        const voiceA = $("voiceA"), voiceB = $("voiceB");
        const weight = $("weight"), weightLabel = $("weight-label");
        const saveBlendBtn = $("save-blend"), deleteBlendBtn = $("delete-blend");
        const saveForm = $("save-form"), saveName = $("save-name");
        const saveConfirm = $("save-confirm"), saveCancel = $("save-cancel");
        const go = $("go"), status = $("status"), count = $("count");
        const result = $("result"), player = $("player"), dl = $("download"), info = $("info");
        const clearBtn = $("clear");

        let lastUrl = null;
        let mode = "single";
        let voicesCache = [];
        let defaultVoice = "";
        let blendsCache = {};   // name -> spec

        const VOICE_GROUPS = {
            af_: "American · Female",
            am_: "American · Male",
            bf_: "British · Female",
            bm_: "British · Male",
            ef_: "Spanish · Female",
            em_: "Spanish · Male",
            ff_: "French · Female",
            hf_: "Hindi · Female",
            hm_: "Hindi · Male",
            if_: "Italian · Female",
            im_: "Italian · Male",
            jf_: "Japanese · Female",
            jm_: "Japanese · Male",
            pf_: "Portuguese · Female",
            pm_: "Portuguese · Male",
            zf_: "Chinese · Female",
            zm_: "Chinese · Male",
        };
        const GROUP_ORDER = [
            "Saved Blends",
            "American · Male", "American · Female",
            "British · Male", "British · Female",
            "Spanish · Male", "Spanish · Female",
            "French · Female",
            "Italian · Male", "Italian · Female",
            "Hindi · Male", "Hindi · Female",
            "Japanese · Male", "Japanese · Female",
            "Portuguese · Male", "Portuguese · Female",
            "Chinese · Male", "Chinese · Female",
            "Other",
            "Legacy (v0)",
        ];

        function groupFor(voiceName) {
            if (voiceName.includes("_v0")) return "Legacy (v0)";
            return VOICE_GROUPS[voiceName.slice(0, 3)] || "Other";
        }

        // Populate a single <select> with stock voices, and optionally include saved blends.
        // selectedValue: the option to mark selected; falls back to defaultVoice.
        function populateSelect(select, { includeBlends, selectedValue }) {
            const groups = {};
            if (includeBlends) {
                const entries = Object.entries(blendsCache).sort();
                if (entries.length) {
                    groups["Saved Blends"] = entries.map(([name, spec]) => ({
                        value: spec,
                        label: `${name}  (${spec})`,
                        dataset: { blendName: name },
                    }));
                }
            }
            for (const v of voicesCache) {
                const label = groupFor(v);
                (groups[label] ||= []).push({ value: v, label: v });
            }
            select.innerHTML = "";
            const target = selectedValue || defaultVoice;
            for (const gLabel of GROUP_ORDER) {
                const items = groups[gLabel];
                if (!items) continue;
                const og = document.createElement("optgroup");
                og.label = gLabel;
                // Sort non-blend items; blends are already sorted above.
                if (gLabel !== "Saved Blends") items.sort((a, b) => a.label.localeCompare(b.label));
                for (const item of items) {
                    const o = document.createElement("option");
                    o.value = item.value;
                    o.textContent = item.label;
                    if (item.dataset) for (const [k, v] of Object.entries(item.dataset)) o.dataset[k] = v;
                    if (item.value === target) o.selected = true;
                    og.appendChild(o);
                }
                select.appendChild(og);
            }
        }

        async function loadVoicesAndBlends() {
            try {
                const [voicesRes, blendsRes] = await Promise.all([
                    fetch("/voices"),
                    fetch("/blends"),
                ]);
                if (!voicesRes.ok) throw new Error("voices: " + voicesRes.statusText);
                const { voices, default: def } = await voicesRes.json();
                voicesCache = voices;
                defaultVoice = def;
                if (blendsRes.ok) {
                    const { blends } = await blendsRes.json();
                    blendsCache = Object.fromEntries(blends.map((b) => [b.name, b.spec]));
                }
                populateSelect(voice, { includeBlends: true });
                populateSelect(voiceA, { includeBlends: false });
                // Pick a contrasting default for B — first voice that isn't the default.
                const bPick = voicesCache.find((v) => v !== defaultVoice) || defaultVoice;
                populateSelect(voiceB, { includeBlends: false, selectedValue: bPick });
                updateDeleteBtn();
            } catch (e) {
                console.error("failed to load voices/blends", e);
                voice.innerHTML = '<option value="">failed to load — retry</option>';
            }
        }

        // Mode switching
        function setMode(newMode) {
            mode = newMode;
            for (const b of document.querySelectorAll(".mode-btn")) {
                b.classList.toggle("active", b.dataset.mode === mode);
            }
            for (const el of document.querySelectorAll(".single-only")) {
                el.classList.toggle("hidden", mode !== "single");
            }
            for (const el of document.querySelectorAll(".blend-only")) {
                el.classList.toggle("hidden", mode !== "blend");
            }
            if (mode !== "blend") saveForm.classList.add("hidden");
            resetDeleteBtn();
        }
        for (const b of document.querySelectorAll(".mode-btn")) {
            b.addEventListener("click", () => setMode(b.dataset.mode));
        }

        // Weight slider — build "X% A · Y% B" label
        function updateWeightLabel() {
            const w = parseInt(weight.value, 10);
            weightLabel.textContent = `${w}% A · ${100 - w}% B`;
        }
        weight.addEventListener("input", updateWeightLabel);

        // Build the voice string to send to the TTS endpoint.
        function currentVoiceSpec() {
            if (mode === "single") {
                return voice.value || undefined;
            }
            const a = voiceA.value, b = voiceB.value;
            if (!a || !b) return undefined;
            const w = parseInt(weight.value, 10);
            if (w === 50) return `${a}+${b}`;
            return `${a}(${w})+${b}(${100 - w})`;
        }

        // Show the × button only when the current single-mode selection is a saved blend.
        function updateDeleteBtn() {
            const sel = voice.options[voice.selectedIndex];
            const isBlend = sel && sel.dataset.blendName;
            deleteBlendBtn.classList.toggle("hidden", !isBlend);
            resetDeleteBtn();
        }
        function resetDeleteBtn() {
            deleteBlendBtn.classList.remove("armed");
            deleteBlendBtn.textContent = "×";
            deleteBlendBtn.dataset.armedName = "";
        }
        voice.addEventListener("change", updateDeleteBtn);

        // Two-tap delete (no confirm() — iframes/PWAs can suppress it).
        deleteBlendBtn.addEventListener("click", async () => {
            const sel = voice.options[voice.selectedIndex];
            const name = sel && sel.dataset.blendName;
            if (!name) return;
            if (deleteBlendBtn.dataset.armedName !== name) {
                deleteBlendBtn.classList.add("armed");
                deleteBlendBtn.textContent = "tap again";
                deleteBlendBtn.dataset.armedName = name;
                setTimeout(() => {
                    if (deleteBlendBtn.dataset.armedName === name) resetDeleteBtn();
                }, 3000);
                return;
            }
            const res = await fetch(`/blends/${encodeURIComponent(name)}`, { method: "DELETE" });
            if (!res.ok && res.status !== 204) {
                status.textContent = `delete failed — ${res.status}`;
                status.classList.add("error");
                resetDeleteBtn();
                return;
            }
            delete blendsCache[name];
            populateSelect(voice, { includeBlends: true });
            updateDeleteBtn();
            status.classList.remove("error");
            status.textContent = `deleted blend "${name}"`;
        });

        // Inline save form (no prompt() — iframes/PWAs can suppress it).
        function openSaveForm() {
            const spec = currentVoiceSpec();
            if (!spec || !spec.includes("+")) {
                status.textContent = "pick two voices first";
                status.classList.add("error");
                return;
            }
            status.classList.remove("error");
            status.textContent = "";
            saveForm.classList.remove("hidden");
            saveName.value = "";
            saveName.focus();
        }
        function closeSaveForm() { saveForm.classList.add("hidden"); }

        async function commitSaveBlend() {
            const spec = currentVoiceSpec();
            const name = saveName.value.trim();
            if (!/^[a-zA-Z][a-zA-Z0-9_]{0,39}$/.test(name)) {
                status.textContent = "invalid name — letters/digits/underscore, start with a letter";
                status.classList.add("error");
                saveName.focus();
                return;
            }
            if (!spec || !spec.includes("+")) {
                status.textContent = "pick two voices first";
                status.classList.add("error");
                return;
            }
            saveConfirm.disabled = true;
            try {
                const res = await fetch("/blends", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, spec }),
                });
                if (!res.ok) {
                    const msg = await res.text().catch(() => "");
                    status.textContent = `save failed — ${res.status} ${msg}`;
                    status.classList.add("error");
                    return;
                }
                blendsCache[name] = spec;
                populateSelect(voice, { includeBlends: true, selectedValue: spec });
                updateDeleteBtn();
                closeSaveForm();
                status.classList.remove("error");
                status.textContent = `saved blend "${name}"`;
            } finally {
                saveConfirm.disabled = false;
            }
        }

        saveBlendBtn.addEventListener("click", openSaveForm);
        saveConfirm.addEventListener("click", commitSaveBlend);
        saveCancel.addEventListener("click", closeSaveForm);
        saveName.addEventListener("keydown", (e) => {
            if (e.key === "Enter") { e.preventDefault(); commitSaveBlend(); }
            else if (e.key === "Escape") closeSaveForm();
        });

        loadVoicesAndBlends();

        const updateCount = () => {
            const n = text.value.length;
            count.textContent = n;
            clearBtn.disabled = n === 0;
        };
        text.addEventListener("input", updateCount);

        clearBtn.addEventListener("click", () => {
            text.value = "";
            updateCount();
            text.focus();
        });

        async function generate() {
            const body = text.value.trim();
            if (!body) {
                status.textContent = "enter some text first";
                status.classList.add("error");
                return;
            }
            status.classList.remove("error");
            status.textContent = "synthesizing…";
            go.disabled = true;
            result.classList.remove("visible");

            const format = fmt.value;
            const t0 = performance.now();
            try {
                const res = await fetch("/tts", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        text: body,
                        voice: currentVoiceSpec(),
                        format,
                    }),
                });
                if (!res.ok) {
                    const msg = await res.text().catch(() => "");
                    throw new Error(`${res.status} ${msg || res.statusText}`);
                }
                const blob = await res.blob();
                if (lastUrl) URL.revokeObjectURL(lastUrl);
                lastUrl = URL.createObjectURL(blob);
                player.src = lastUrl;
                dl.href = lastUrl;
                const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
                dl.download = `tars-${stamp}.${format}`;
                const kb = (blob.size / 1024).toFixed(1);
                const ms = Math.round(performance.now() - t0);
                info.textContent = `${kb} KB · ${ms} ms · ${format}`;
                result.classList.add("visible");
                status.textContent = "ready";
                player.play().catch(() => {});
            } catch (e) {
                console.error(e);
                status.classList.add("error");
                status.textContent = `failed — ${e.message}`;
            } finally {
                go.disabled = false;
            }
        }

        go.addEventListener("click", generate);
        text.addEventListener("keydown", (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === "Enter") generate();
        });
    </script>
</body>
</html>
