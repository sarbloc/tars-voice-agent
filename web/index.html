<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TARS Voice Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 { font-size: 2em; margin-bottom: 10px; }
        #status { color: #888; margin: 20px 0; font-size: 1.1em; }
        #agentState {
            font-size: 0.95em;
            color: #666;
            margin: 8px 0 16px;
            min-height: 1.4em;
            transition: color 0.3s;
        }
        #agentState.listening { color: #4a9eff; }
        #agentState.thinking { color: #ffaa4a; }
        #agentState.speaking { color: #4aff7f; }
        button {
            padding: 16px 48px;
            font-size: 1.2em;
            border: 2px solid #4a9eff;
            background: transparent;
            color: #4a9eff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #4a9eff22; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        button.connected {
            border-color: #ff4a4a;
            color: #ff4a4a;
        }
        .indicator {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: #4a9eff;
            margin: 20px auto;
        }
        .indicator.listening {
            background: #4a9eff;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .indicator.thinking {
            background: #ffaa4a;
            animation: spin 1s linear infinite;
        }
        .indicator.speaking {
            background: #4aff7f;
            animation: speak 0.6s ease-in-out infinite;
        }
        .indicator.idle {
            background: #4a9eff;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); opacity: 0.7; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.7; }
        }
        @keyframes speak {
            0%, 100% { transform: scaleX(1) scaleY(1); opacity: 0.8; }
            50% { transform: scaleX(1.4) scaleY(0.8); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TARS</h1>
        <p id="status">Ready to connect</p>
        <div id="agentState"></div>
        <div id="indicator" class="indicator" style="display:none"></div>
        <button id="connectBtn" onclick="toggleConnection()">Connect</button>
        <audio id="agentAudio" autoplay></audio>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Use current hostname so it works from any device on LAN
        const LK_HOST = window.location.hostname;
        // When served over HTTPS (via Caddy), use wss through the same proxy
        // Caddy proxies /rtc* to LiveKit on port 7880
        const LK_PROTO = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const LK_PORT = window.location.protocol === 'https:' ? window.location.port : '7880';
        const LIVEKIT_URL = LK_PROTO + '://' + LK_HOST + ':' + LK_PORT;
        const TOKEN_URL = '/token';

        let room = null;
        let connected = false;

        const STATE_LABELS = {
            initializing: 'Initializing...',
            idle: 'Ready',
            listening: 'Listening...',
            thinking: 'Thinking...',
            speaking: 'Speaking...',
        };

        function updateAgentState(state) {
            const el = document.getElementById('agentState');
            const indicator = document.getElementById('indicator');
            el.textContent = STATE_LABELS[state] || '';
            el.className = state || '';
            // Update indicator animation class
            indicator.className = 'indicator ' + (state || 'idle');
        }

        function handleAttributesChanged(changedAttributes, participant) {
            const state = changedAttributes['lk.agent.state']
                || (participant.attributes && participant.attributes['lk.agent.state']);
            if (state) {
                updateAgentState(state);
            }
        }

        async function toggleConnection() {
            if (connected) {
                await disconnect();
            } else {
                await connect();
            }
        }

        async function connect() {
            const btn = document.getElementById('connectBtn');
            const status = document.getElementById('status');
            const indicator = document.getElementById('indicator');

            btn.disabled = true;
            status.textContent = 'Connecting...';

            try {
                const resp = await fetch(TOKEN_URL);
                const data = await resp.json();

                room = new LivekitClient.Room();

                // Handle agent audio
                room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
                    if (track.kind === 'audio') {
                        const audioEl = document.getElementById('agentAudio');
                        track.attach(audioEl);
                    }
                });

                // Listen for agent state changes via participant attributes
                room.on(LivekitClient.RoomEvent.ParticipantAttributesChanged, handleAttributesChanged);

                // Check existing participants for agent state on join
                room.on(LivekitClient.RoomEvent.ParticipantConnected, (participant) => {
                    const state = participant.attributes && participant.attributes['lk.agent.state'];
                    if (state) updateAgentState(state);
                });

                await room.connect(LIVEKIT_URL, data.token, {
                    autoSubscribe: true,
                });

                // Check already-connected participants for agent state
                room.remoteParticipants.forEach((participant) => {
                    const state = participant.attributes && participant.attributes['lk.agent.state'];
                    if (state) updateAgentState(state);
                });

                await room.localParticipant.setMicrophoneEnabled(true);

                connected = true;
                btn.disabled = false;
                btn.textContent = 'Disconnect';
                btn.classList.add('connected');
                status.textContent = 'Connected - speak to TARS';
                indicator.style.display = 'block';

            } catch (e) {
                console.error('Connection failed:', e);
                status.textContent = 'Connection failed: ' + e.message;
                btn.disabled = false;
            }
        }

        async function disconnect() {
            if (room) {
                await room.disconnect();
                room = null;
            }
            connected = false;
            const btn = document.getElementById('connectBtn');
            btn.textContent = 'Connect';
            btn.classList.remove('connected');
            document.getElementById('status').textContent = 'Disconnected';
            document.getElementById('agentState').textContent = '';
            document.getElementById('agentState').className = '';
            document.getElementById('indicator').style.display = 'none';
        }
    </script>
</body>
</html>
