<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TARS Voice Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 { font-size: 2em; margin-bottom: 10px; }
        #status { color: #888; margin: 20px 0; }
        button {
            padding: 16px 48px;
            font-size: 1.2em;
            border: 2px solid #4a9eff;
            background: transparent;
            color: #4a9eff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #4a9eff22; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        button.connected {
            border-color: #ff4a4a;
            color: #ff4a4a;
        }
        .pulse {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: #4a9eff;
            margin: 20px auto;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TARS</h1>
        <p id="status">Ready to connect</p>
        <div id="pulse" class="pulse" style="display:none"></div>
        <button id="connectBtn" onclick="toggleConnection()">Connect</button>
        <audio id="agentAudio" autoplay></audio>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Use current hostname so it works from any device on LAN
        const LK_HOST = window.location.hostname;
        // When served over HTTPS (via Caddy), use wss through the same proxy
        // Caddy proxies /rtc* to LiveKit on port 7880
        const LK_PROTO = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const LK_PORT = window.location.protocol === 'https:' ? window.location.port : '7880';
        const LIVEKIT_URL = LK_PROTO + '://' + LK_HOST + ':' + LK_PORT;
        const TOKEN_URL = '/token';

        let room = null;
        let connected = false;

        async function toggleConnection() {
            if (connected) {
                await disconnect();
            } else {
                await connect();
            }
        }

        async function connect() {
            const btn = document.getElementById('connectBtn');
            const status = document.getElementById('status');
            const pulse = document.getElementById('pulse');

            btn.disabled = true;
            status.textContent = 'Connecting...';

            try {
                // Get token from our simple token server
                const resp = await fetch(TOKEN_URL);
                const data = await resp.json();

                room = new LivekitClient.Room();

                // Handle agent audio
                room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
                    if (track.kind === 'audio') {
                        const audioEl = document.getElementById('agentAudio');
                        track.attach(audioEl);
                    }
                });

                await room.connect(LIVEKIT_URL, data.token, {
                    autoSubscribe: true,
                });

                // Publish microphone
                await room.localParticipant.setMicrophoneEnabled(true);

                connected = true;
                btn.disabled = false;
                btn.textContent = 'Disconnect';
                btn.classList.add('connected');
                status.textContent = 'Connected - speak to TARS';
                pulse.style.display = 'block';

            } catch (e) {
                console.error('Connection failed:', e);
                status.textContent = 'Connection failed: ' + e.message;
                btn.disabled = false;
            }
        }

        async function disconnect() {
            if (room) {
                await room.disconnect();
                room = null;
            }
            connected = false;
            const btn = document.getElementById('connectBtn');
            btn.textContent = 'Connect';
            btn.classList.remove('connected');
            document.getElementById('status').textContent = 'Disconnected';
            document.getElementById('pulse').style.display = 'none';
        }
    </script>
</body>
</html>
